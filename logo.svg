  <!-- Ubuntu-style White Circle -->
  <circle cx="100" cy="100" r="70" fill="none" stroke="white" stroke-width="8" stroke-dasharray="110 36.5" />
  
  <!-- Bunny Ears (Simplified) -->
  <path d="M70 60 Q60 10 40 30 Q30 50 60 70" fill="white" />
  <path d="M130 60 Q140 10 160 30 Q170 50 140 70" fill="white" />
  
