<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Discord Blurple Background Circle -->
  <circle cx="100" cy="100" r="100" fill="#5865F2" />
  
  <!-- Ubuntu Circle of Friends (The Outer Ring) -->
  <g fill="white">
    <!-- The ring segments -->
    <path d="M100 45 A 55 55 0 0 1 147.6 127.5 L 134.6 120 A 40 40 0 0 0 100 60 Z" opacity="0.9" />
    <path d="M147.6 127.5 A 55 55 0 0 1 52.4 127.5 L 65.4 120 A 40 40 0 0 0 134.6 120 Z" opacity="0.9" />
    <path d="M52.4 127.5 A 55 55 0 0 1 100 45 L 100 60 A 40 40 0 0 0 65.4 120 Z" opacity="0.9" />
    
    <!-- The Ubuntu "Heads" -->
    <circle cx="100" cy="45" r="10" />
    <circle cx="147.6" cy="127.5" r="10" />
    <circle cx="52.4" cy="127.5" r="10" />
  </g>
  
  <!-- Discord Mascot (Clyde) with Bunny Ears in the Center -->
  <g transform="translate(65, 75) scale(0.7)" fill="white">
    <!-- Ears -->
    <path d="M30 10 Q20 -20 10 0 Q0 20 30 30" />
    <path d="M70 10 Q80 -20 90 0 Q100 20 70 30" />
    
    <!-- Face (Simplified Clyde) -->
    <path d="M10 30 Q0 30 0 40 L 0 70 Q0 80 10 80 L 20 80 L 25 90 L 40 80 L 60 80 L 75 90 L 80 80 L 90 80 Q100 80 100 70 L 100 40 Q100 30 90 30 Z" />
    
    <!-- Eyes (Cutouts) -->
    <circle cx="30" cy="55" r="6" fill="#5865F2" />
    <circle cx="70" cy="55" r="6" fill="#5865F2" />
  </g>
  
  <!-- "DiscoBunty" Text -->
  <text x="100" y="180" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="800" fill="white" text-anchor="middle" letter-spacing="1">DISCOBUNTY</text>
</svg>
